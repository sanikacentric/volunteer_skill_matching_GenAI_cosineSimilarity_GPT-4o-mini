services:
  - type: web
    name: volunteer-skill-matching-api
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: OPENAI_API_KEY
        sync: false        # you enter this manually in Render dashboard
    healthCheckPath: /health
